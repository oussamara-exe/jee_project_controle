# Configuration de l'Application de Gestion RH
# ==============================================

# Informations sur l'application
app.name=Gestion RH Avancée
app.version=1.0.0
app.description=Système de gestion des ressources humaines

# Configuration de la base de données
# Note: En production JEE, la datasource est configurée dans le serveur d'application
db.name=gestion_rh
db.host=localhost
db.port=3306
db.username=gestion_rh_user

# Configuration de sécurité
security.session.timeout=30
security.password.min.length=8
security.password.require.uppercase=true
security.password.require.lowercase=true
security.password.require.digit=true
security.password.require.special=false
security.max.login.attempts=5
security.account.lockout.duration.hours=24

# Configuration des congés
conges.jours.annuels.default=22
conges.jours.maladie.max=90
conges.jours.maternite=98
conges.jours.paternite=3

# Configuration de la paie
paie.taux.heures.sup.25=1.25
paie.taux.heures.sup.50=1.50
paie.cotisations.sociales.taux=0.21
paie.ir.tranches=0,30000,50000,60000,80000,180000
paie.ir.taux=0,0.10,0.20,0.30,0.34,0.38
paie.prime.anciennete.taux=0.02
paie.prime.anciennete.max=0.20
paie.indemnite.transport=400
paie.indemnite.repas=30

# Configuration du reporting
report.output.path=/tmp/gestion-rh/reports
report.logo.path=/images/logo.png
report.company.name=Votre Entreprise
report.company.address=123 Rue Example, Ville, Pays
report.company.phone=+212 5XX-XXXXXX
report.company.email=contact@entreprise.ma

# Configuration de l'upload de fichiers
upload.max.file.size=5242880
upload.allowed.extensions=jpg,jpeg,png,pdf
upload.photos.path=/uploads/photos
upload.documents.path=/uploads/documents

# Configuration des notifications
notifications.retention.days=90
notifications.email.enabled=false
notifications.email.smtp.host=smtp.example.com
notifications.email.smtp.port=587
notifications.email.from=noreply@gestion-rh.ma

# Configuration du logging
logging.level.root=INFO
logging.level.ma.projet.rh=DEBUG
logging.file.path=logs
logging.file.max.size=10MB
logging.file.max.history=30

# Configuration de l'historique
audit.retention.days=365
audit.log.all.actions=true
audit.log.read.operations=false
audit.log.ip.address=true
audit.log.user.agent=true

# Configuration des emails (si activé)
email.templates.path=/WEB-INF/email-templates
email.template.conge.approved=conge-approved.html
email.template.conge.rejected=conge-rejected.html
email.template.paie.generated=paie-generated.html

# Configuration du cache
cache.enabled=true
cache.ttl.seconds=3600
cache.max.size=1000

# Configuration des tâches planifiées
scheduler.enabled=true
scheduler.paie.generation.cron=0 0 1 1 * ?
scheduler.notifications.cleanup.cron=0 0 2 * * ?
scheduler.audit.cleanup.cron=0 0 3 1 * ?

# Environnement
environment=development
debug.mode=true

